<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YESPOT!</title>
    <link rel="stylesheet" href="../static/css/secondpage.css">
</head>
<body>
    <section class="group-create-page">
        <div class="topbar">
            <div class="topbar-left">
                <div class="logo">
                    <p>YESPOT!</p>
                </div>
                <div class="nav-menu">
                    <div class="home">
                        <div class="home-icon"></div>
                        <p class="home-text">홈</p>
                    </div>
                    <p class="my-group-text">내 모임</p>
                </div>
            </div>
            <div class="topbar-right">
                <img class="alam-icon" src="../static/images/ix_alarm-bell.svg">
                <div class="login-section">
                    <img class="person-icon" src="../static/images/bi_people-circle.svg">
                    <div class="login-group">
                        <div class="login-text">
                            <p>로그인</p>
                        </div>
                        <div class="dropdown-arrow"></div>
                    </div>
                    
                </div>
            </div>
        </div>
        <div class="main">
            <div class="main-top">
                <p class="page-description">모임 생성을 위해<br>간단한 정보를 입력해주세요</p>
                <div class="form-group">
                    <div class="member-count-field">
                        <p class="member-count">인원수</p>
                        <input type="number" min="0" class="form-input member-count-input" required>
                    </div>
                    <div class="group-name-field">
                        <p class="group-name">모임 이름</p>
                        <input type="text" class="form-input group-name-input" required>
                    </div>
                </div>
                <div class="date-time-field">
                    <p class="date-time">모임 일시</p>
                    <div class="date-time-input-group">
                        <div class="calender-icon"></div>
                        <input type="date" class="form-input date-input" required>
                        <div class="clock-icon"></div>
                        <input type="time" class="form-input time-input" required>

                </div>
            </div>
            <div class="main-bottom">
                <div class="group-category-field">
                    <div class="group-category-text">
                        <div class="group-category-title-frame">
                            <p class="group-category-title">모임 카테고리</p>
                        </div>
                        <div class="group-category-description">
                            <div class="description-frame">
                                <p class="description-text">(복수 선택 가능)</p>
                            </div>
                        </div>
                    </div>
                    <div class="group-checkbox">
                        <div class="group-checkbox-top">
                            <label class="checkbox">
                                <input type="checkbox" class="checkbox-input">
                                <div class="checkbox-icon"></div>
                                <div class="text-frame">
                                    <p class="checkbox-text">회식</p>
                                </div>
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" class="checkbox-input">
                                <div class="checkbox-icon"></div>
                                <div class="text-frame">
                                    <p class="checkbox-text">카페</p>
                                </div>
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" class="checkbox-input">
                                <div class="checkbox-icon"></div>
                                <div class="text-frame">
                                    <p class="checkbox-text">운동</p>
                                </div>
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" class="checkbox-input">
                                <div class="checkbox-icon"></div>
                                <div class="text-frame">
                                    <p class="checkbox-text">술/펍</p>
                                </div>
                            </label>
                        </div>
                        <div class="group-checkbox-bottom">
                            <label class="checkbox">
                                <input type="checkbox" class="checkbox-input">
                                <div class="checkbox-icon"></div>
                                <div class="text-frame">
                                    <p class="checkbox-text">데이트</p>
                                </div>
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" class="checkbox-input">
                                <div class="checkbox-icon"></div>
                                <div class="text-frame">
                                    <p class="checkbox-text">놀거리</p>
                                </div>
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" class="checkbox-input">
                                <div class="checkbox-icon"></div>
                                <div class="text-frame">
                                    <p class="checkbox-text">여행</p>
                                </div>
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" class="checkbox-input">
                                <div class="checkbox-icon"></div>
                                <div class="text-frame">
                                    <p class="checkbox-text">기타</p>
                                </div>
                            </label>
                        </div>
                    </div>
                    <div class="group-create-btn" id="groupCreateBtn">
                        <p class="group-create-text">그룹 만들기</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
    const groupCreateBtn = document.getElementById("groupCreateBtn");

    groupCreateBtn.addEventListener("click", function () {
        const memberCount = document.querySelector(".member-count-input").value.trim();
        const groupName = document.querySelector(".group-name-input").value.trim();
        const date = document.querySelector(".date-input").value;
        const time = document.querySelector(".time-input").value;
        const checkedCategory = document.querySelectorAll(".checkbox-input:checked");

        if (!memberCount || !groupName || !date || !time || checkedCategory.length === 0) {
            alert("모임 정보를 모두 입력해주세요!");
            return;
        }

        window.location.href = "../YESPOT!/thirdpage.html";
    });
    </script>

</body>
</html>
